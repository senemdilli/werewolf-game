services:
  app:
    build: .
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://werewolf:werewolf@postgres:5432/werewolf
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      ADMIN_SECRET: dacnEk-vidba7-bitzac
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: werewolf
      POSTGRES_PASSWORD: werewolf
      POSTGRES_DB: werewolf
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U werewolf"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
